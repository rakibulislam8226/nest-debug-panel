name: Publish to npm

on:
  push:
    branches: [master]
  workflow_dispatch: # manual "Run workflow" button in the Actions tab

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build

      # Fully automatic release: if the version in package.json is already on
      # npm, bump the patch version right here and push the bump back to
      # master. (Pushes made with GITHUB_TOKEN don't re-trigger workflows, so
      # this cannot loop; [skip ci] is extra insurance.)
      - name: Auto-bump version if already published
        run: |
          NAME=$(node -p "require('./package.json').name")
          LOCAL=$(node -p "require('./package.json').version")
          PUBLISHED=$(npm view "$NAME" version 2>/dev/null || echo "none")
          echo "local=$LOCAL published=$PUBLISHED"
          if [ "$LOCAL" = "$PUBLISHED" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            # Sync with master first — re-runs and racing pushes otherwise
            # operate on a stale checkout and get rejected.
            git pull --rebase origin master
            RESYNCED=$(node -p "require('./package.json').version")
            if [ "$RESYNCED" = "$PUBLISHED" ]; then
              npm version patch -m "chore: release v%s [skip ci]"
              git push origin master --follow-tags
            fi
          fi

      - name: Publish
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
